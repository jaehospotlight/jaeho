---
layout: default
title: Writing
---

<div class="blog-header">
  <h1>Writing</h1>
</div>

<ul class="blog-list">
  {% for post in site.posts %}
  <li>
    <a href="{{ post.url | relative_url }}">
      <span class="blog-list-title">{{ post.title }}</span>
      <span class="blog-list-date">{{ post.date | date: "%b %d, %Y" }}</span>
    </a>
  </li>
  {% endfor %}
</ul>
